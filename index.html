<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>kubota WSM AI - Final PDF Fix</title>

  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-default.css">
  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-layout.css">
  <script src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/chat-messenger.js"></script>

  <style>
    :root { --panel-width: min(46vw, 920px); --panel-min: 360px; --divider: rgba(0,0,0,.10); --header-h: 48px; }
    html, body { height: 100%; margin: 0; overflow: hidden; background: #fff; }
    .app { height: 100vh; width: 100vw; display: flex; align-items: stretch; }
    .chatArea { flex: 1; position: relative; }

    .pdfPanel { width: 0; flex: 0 0 auto; border-left: 1px solid var(--divider); background: #fff; overflow: hidden; transition: all 300ms ease; }
    body.pdf-open .pdfPanel { width: max(var(--panel-min), var(--panel-width)); }
    .pdfPanelInner { height: 100%; width: max(var(--panel-min), var(--panel-width)); display: flex; flex-direction: column; }
    .pdfHeader { height: var(--header-h); display: flex; align-items: center; padding: 0 10px; background: #fafafa; border-bottom: 1px solid var(--divider); justify-content: space-between; }
    .pdfTitle { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pdfFrame { flex: 1; border: 0; background: #eee; }

    .closeBtn { padding: 6px 12px; background: #eee; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 12px; }

    #custom-mic-btn {
      position: fixed; bottom: 15px; right: 65px; z-index: 2147483647;
      width: 44px; height: 44px; border: none; background: #f0f0f0;
      border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #custom-mic-btn.recording { background: #ff4b4b; color: white; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,75,75,0.4); } 100% { box-shadow: 0 0 0 10px rgba(255,75,75,0); } }

    @media (max-width: 900px) {
      .pdfPanel { position: fixed; right: 0; top: 0; height: 100vh; z-index: 99999; transform: translateX(100%); }
      body.pdf-open .pdfPanel { transform: translateX(0); width: 100vw; }
      .pdfPanelInner { width: 100vw; }
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="chatArea">
      <chat-messenger id="messenger" allow-citations="true" style="width:100%; height:100%;">
        <chat-messenger-container chat-title="kubota-wsm-ai">
          <chat-messenger-pdf-preview slot="side-panel"></chat-messenger-pdf-preview>
        </chat-messenger-container>
      </chat-messenger>
      <button id="custom-mic-btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>
    <aside class="pdfPanel">
      <div class="pdfPanelInner">
        <div class="pdfHeader">
          <div id="pdfTitle" class="pdfTitle">引用プレビュー</div>
          <button class="closeBtn" onclick="closePdfPanel()">閉じる</button>
        </div>
        <iframe id="pdfFrame" class="pdfFrame"></iframe>
      </div>
    </aside>
  </div>

  <script>
    const DEPLOYMENT = "projects/project-c482c56a-16d2-4b8c-b89/locations/us/apps/985287da-6040-4564-bc29-53ccd6a0b853/deployments/a5cff52b-8173-46dd-8057-7ce28af81a21";

    /* =====================================================
       核心修正：サイズ制限を回避するPDF.jsビューアー方式
    ===================================================== */
    function openPdfInRightPanel(url) {
      // PDF.js の公開ビューアーを利用して、サイズ制限なく表示する
      // この方式は、URLに直接 #page=X を渡すだけでスマホでもジャンプが可能です
      const pdfJsViewer = "https://mozilla.github.io/pdf.js/web/viewer.html?file=";
      
      // 1. オリジナルのURLからページ番号情報を取得
      const cleanUrl = url.split('#')[0];
      const pageMatch = url.match(/#page=(\d+)/);
      const pageNum = pageMatch ? pageMatch[1] : 1;
      
      // 2. ビューアーURLを組み立て（元のURLをエンコードして渡す）
      let finalUrl = pdfJsViewer + encodeURIComponent(cleanUrl) + "#page=" + pageNum;

      const frame = document.getElementById("pdfFrame");
      frame.src = "about:blank";
      
      setTimeout(() => {
        frame.src = finalUrl;
        document.body.classList.add("pdf-open");
      }, 50);
    }

    function closePdfPanel() {
      document.body.classList.remove("pdf-open");
      document.getElementById("pdfFrame").src = "";
    }

    /* 音声認識ロジック (維持) */
    const micBtn = document.getElementById('custom-mic-btn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      micBtn.addEventListener('click', () => { try { recognition.start(); } catch(e) { recognition.stop(); } });
      recognition.onstart = () => { micBtn.classList.add('recording'); };
      recognition.onend = () => { micBtn.classList.remove('recording'); };
      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        const findAndFill = (root) => {
          const input = root.querySelector('textarea, input:not([type="hidden"])');
          if (input) {
            input.value = text;
            input.dispatchEvent(new Event('input', { bubbles: true, composed: true }));
            input.focus();
            return true;
          }
          const shadows = Array.from(root.querySelectorAll('*')).filter(n => n.shadowRoot);
          for (let s of shadows) { if (findAndFill(s.shadowRoot)) return true; }
          return false;
        };
        findAndFill(document.getElementById("messenger").shadowRoot);
      };
    }

    /* 初期化 */
    window.addEventListener("DOMContentLoaded", () => {
      const t = setInterval(() => {
        if (window.chatSdk) {
          chatSdk.registerContext(chatSdk.prebuilts.ces.createContext({
            deploymentName: DEPLOYMENT,
            tokenBroker: { enableTokenBroker: true },
            pdfPreview: { enablePdfPreview: true }
          }));
          clearInterval(t);
        }
      }, 300);

      window.addEventListener("click", (e) => {
        const path = e.composedPath();
        const a = path.find(el => el.tagName === "A");
        if (a && (a.href.includes(".pdf") || a.href.includes("storage.googleapis.com"))) {
          e.preventDefault();
          e.stopImmediatePropagation();
          openPdfInRightPanel(a.href);
        }
      }, true);
    });
  </script>
</body>
</html>
