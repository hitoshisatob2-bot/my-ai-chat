<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>kubota WSM AI - Voice Pro</title>
  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-default.css">
  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-layout.css">
  <script src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/chat-messenger.js"></script>
  <style>
    :root { --panel-width: min(46vw, 920px); --panel-min: 360px; --divider: rgba(0,0,0,.10); --header-h: 48px; }
    html, body { height: 100%; margin: 0; overflow: hidden; background: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .app { height: 100vh; width: 100vw; display: flex; align-items: stretch; }
    .chatArea { flex: 1; position: relative; }
    
    /* 起動オーバーレイ（確実に反応するように修正） */
    #init-voice-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff; z-index: 999999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .start-btn { 
      padding: 24px 48px; font-size: 20px; font-weight: bold; cursor: pointer; 
      background: #007bff; color: white; border: none; border-radius: 50px; 
      box-shadow: 0 10px 20px rgba(0,123,255,0.3); transition: transform 0.2s;
    }
    .start-btn:active { transform: scale(0.95); }

    #custom-mic-btn {
      position: fixed; bottom: 15px; right: 65px; z-index: 2147483647;
      width: 44px; height: 44px; border: none; background: #f0f0f0;
      border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #custom-mic-btn.recording { background: #ff4b4b; color: white; }
    
    #speech-control { position: fixed; bottom: 70px; right: 15px; z-index: 2147483647; display: none; }
    .voice-btn { padding: 8px 16px; background: rgba(0,0,0,0.8); color: white; border-radius: 20px; border: none; font-size: 12px; cursor: pointer; }

    .pdfPanel { width: 0; flex: 0 0 auto; border-left: 1px solid var(--divider); background: #fff; overflow: hidden; transition: all 300ms ease; }
    body.pdf-open .pdfPanel { width: max(var(--panel-min), var(--panel-width)); }
  </style>
</head>
<body>

  <div id="init-voice-overlay">
    <button id="start-node" class="start-btn">AIチャットを開始する</button>
    <p style="margin-top:20px; color:#555;">クリックすると音声機能が有効になります</p>
  </div>

      <chat-messenger id="messenger" allow-citations="true" style="width:100%; height:100%;">

        </chat-messenger-container>
