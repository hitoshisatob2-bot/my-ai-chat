<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>kubota WSM AI.b - Stable PDF</title>

  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-default.css">
  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-layout.css">
  <script src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/chat-messenger.js"></script>

  <style>
    :root { --panel-width: min(46vw, 920px); --panel-min: 360px; --divider: rgba(0,0,0,.10); --header-h: 48px; }
    html, body { height: 100%; margin: 0; overflow: hidden; background: #fff; }
    .app { height: 100vh; width: 100vw; display: flex; align-items: stretch; }
    .chatArea { flex: 1; position: relative; }

    .pdfPanel {
      width: 0; flex: 0 0 auto; border-left: 1px solid var(--divider);
      background: #fff; overflow: hidden; transition: all 300ms ease;
    }
    body.pdf-open .pdfPanel { width: max(var(--panel-min), var(--panel-width)); }
    .pdfPanelInner { height: 100%; width: max(var(--panel-min), var(--panel-width)); display: flex; flex-direction: column; }
    .pdfHeader { height: var(--header-h); display: flex; align-items: center; padding: 0 10px; background: #fafafa; border-bottom: 1px solid var(--divider); justify-content: space-between; }
    .pdfFrame { flex: 1; border: 0; width: 100%; height: 100%; }

    /* ─── マイクボタン ─── */
    #custom-mic-btn {
      position: fixed; bottom: 15px; right: 65px; z-index: 2147483647;
      width: 48px; height: 48px; border: none; background: #f0f0f0;
      border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25); transition: background 0.2s; -webkit-tap-highlight-color: transparent;
    }
    #custom-mic-btn.recording { background: #ff4b4b; color: white; animation: pulse 1.2s infinite; }
    #custom-mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(255,75,75,0.5); }
      100% { box-shadow: 0 0 0 14px rgba(255,75,75,0); }
    }

    /* ─── 音声認識オーバーレイ（認識中テキスト表示 + 送信ボタン） ─── */
    #voice-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 2147483646;
      background: rgba(0,0,0,0.55);
      align-items: flex-end; justify-content: center;
      padding-bottom: 80px;
    }
    #voice-overlay.active { display: flex; }
    #voice-box {
      background: #fff; border-radius: 18px; width: min(92vw, 480px);
      padding: 20px 18px 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    #voice-status {
      font-size: 13px; color: #888; margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    #voice-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #ff4b4b;
      animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity: 0.2; } }
    #voice-text {
      font-size: 17px; min-height: 48px; color: #111; line-height: 1.5;
      border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px 12px;
      margin-bottom: 14px; white-space: pre-wrap; word-break: break-all;
      outline: none;
    }
    #voice-text:empty::before { content: attr(data-placeholder); color: #bbb; }
    #voice-actions { display: flex; gap: 10px; }
    #voice-send-btn {
      flex: 1; padding: 11px; background: #1a73e8; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer;
    }
    #voice-send-btn:disabled { background: #ccc; }
    #voice-cancel-btn {
      padding: 11px 18px; background: #f5f5f5; color: #555;
      border: none; border-radius: 10px; font-size: 15px; cursor: pointer;
    }

    @media (max-width: 900px) { .pdfPanel { display: none; } }
  </style>
</head>
<body>

  <div class="app">
    <div class="chatArea">
      <chat-messenger id="messenger" allow-citations="true" style="width:100%; height:100%;">
        <chat-messenger-container chat-title="kubota-wsm-ai">
          <chat-messenger-pdf-preview slot="side-panel"></chat-messenger-pdf-preview>
        </chat-messenger-container>
      </chat-messenger>

      <!-- カスタムマイクボタン -->
      <button id="custom-mic-btn" title="音声入力">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>
    <aside class="pdfPanel">
      <div class="pdfPanelInner">
        <div class="pdfHeader">
          <div id="pdfTitle" style="font-size:12px;">引用プレビュー</div>
          <button onclick="closePdfPanel()">閉じる</button>
        </div>
        <iframe id="pdfFrame" class="pdfFrame"></iframe>
      </div>
    </aside>
  </div>

  <!-- 音声認識オーバーレイ -->
  <div id="voice-overlay">
    <div id="voice-box">
      <div id="voice-status"><span id="voice-dot"></span><span id="voice-status-text">聞いています…</span></div>
      <div id="voice-text" contenteditable="true" data-placeholder="音声認識中..."></div>
      <div id="voice-actions">
        <button id="voice-cancel-btn" onclick="cancelVoice()">キャンセル</button>
        <button id="voice-send-btn" disabled onclick="sendVoiceText()">送信</button>
      </div>
    </div>
  </div>

  <script>
    const DEPLOYMENT = "projects/project-c482c56a-16d2-4b8c-b89/locations/us/apps/985287da-6040-4564-bc29-53ccd6a0b853/deployments/a5cff52b-8173-46dd-8057-7ce28af81a21";

    /* =====================================================
       PDF パネル制御
    ===================================================== */
    function openPdfInRightPanel(url) {
      if (window.innerWidth <= 900) {
        window.open(url, '_blank');
      } else {
        const frame = document.getElementById("pdfFrame");
        frame.src = "about:blank";
        setTimeout(() => { frame.src = url; document.body.classList.add("pdf-open"); }, 50);
      }
    }
    function closePdfPanel() {
      document.body.classList.remove("pdf-open");
      document.getElementById("pdfFrame").src = "";
    }

    /* =====================================================
       Shadow DOM ユーティリティ
    ===================================================== */
    /** Shadow DOM を再帰的に探索して最初にマッチした要素を返す */
    function deepQuery(root, selector) {
      const el = root.querySelector(selector);
      if (el) return el;
      for (const node of root.querySelectorAll('*')) {
        if (node.shadowRoot) {
          const found = deepQuery(node.shadowRoot, selector);
          if (found) return found;
        }
      }
      return null;
    }

    /** Shadow DOM 内の入力要素（textarea / input / contenteditable）を全種類探す */
    function findInputElement(searchRoot) {
      const selectors = [
        'textarea',
        'input[type="text"]',
        '[contenteditable="true"]',
        '[role="textbox"]',
        '[contenteditable]',
        'input:not([type="hidden"]):not([type="submit"]):not([type="button"]):not([type="file"]):not([type="checkbox"]):not([type="radio"])'
      ];
      for (const sel of selectors) {
        const el = deepQuery(searchRoot, sel);
        if (el) return el;
      }
      return null;
    }

    /** React/LitElement 対応のネイティブ値セット */
    function setNativeValue(input, value) {
      if (input.isContentEditable) {
        // contenteditable の場合
        input.focus();
        input.textContent = value;
        input.dispatchEvent(new InputEvent('input', { bubbles: true, composed: true, data: value }));
        input.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
      } else {
        // input / textarea の場合
        const proto = (input.tagName === 'TEXTAREA')
          ? window.HTMLTextAreaElement.prototype
          : window.HTMLInputElement.prototype;
        const setter = Object.getOwnPropertyDescriptor(proto, 'value')?.set;
        if (setter) setter.call(input, value); else input.value = value;
        input.dispatchEvent(new Event('input',  { bubbles: true, composed: true }));
        input.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
      }
    }

    /** 送信ボタンを探してクリック、なければ Enter キー送出 */
    function submitMessage(searchRoot, inputEl) {
      const btnSelectors = [
        'button[type="submit"]',
        'button[aria-label*="送信"]', 'button[aria-label*="Send"]', 'button[aria-label*="send"]',
        '[role="button"][aria-label*="送信"]', '[role="button"][aria-label*="Send"]',
        'button[title*="送信"]', 'button[title*="Send"]',
      ];
      for (const sel of btnSelectors) {
        const btn = deepQuery(searchRoot, sel);
        if (btn && !btn.disabled) { btn.click(); return; }
      }
      // Enter キーでフォールバック
      ['keydown', 'keypress', 'keyup'].forEach(type =>
        inputEl.dispatchEvent(new KeyboardEvent(type, {
          key: 'Enter', code: 'Enter', keyCode: 13,
          bubbles: true, composed: true, cancelable: true
        }))
      );
    }

    /* =====================================================
       音声オーバーレイ制御
    ===================================================== */
    const voiceOverlay    = document.getElementById('voice-overlay');
    const voiceTextEl     = document.getElementById('voice-text');
    const voiceSendBtn    = document.getElementById('voice-send-btn');
    const voiceStatusText = document.getElementById('voice-status-text');
    const voiceDot        = document.getElementById('voice-dot');

    function openVoiceOverlay() {
      voiceTextEl.textContent = '';
      voiceSendBtn.disabled = true;
      voiceStatusText.textContent = '聞いています…';
      voiceDot.style.display = 'block';
      voiceOverlay.classList.add('active');
    }

    function cancelVoice() {
      voiceOverlay.classList.remove('active');
      if (window._recognition) { try { window._recognition.stop(); } catch(e){} }
    }

    function sendVoiceText() {
      const text = voiceTextEl.textContent.trim();
      if (!text) return;
      voiceOverlay.classList.remove('active');
      injectTextAndSend(text);
    }

    /** 認識テキストをチャット入力欄に注入して送信 */
    function injectTextAndSend(text) {
      const messenger   = document.getElementById('messenger');
      const searchRoot  = messenger?.shadowRoot ?? document;
      const inputEl     = findInputElement(searchRoot);

      if (!inputEl) {
        // フォールバック：クリップボードにコピーしてユーザーに通知
        navigator.clipboard?.writeText(text).catch(() => {});
        alert('入力欄が見つかりませんでした。\n認識テキスト：\n' + text);
        return;
      }

      setNativeValue(inputEl, text);
      inputEl.focus();
      setTimeout(() => submitMessage(searchRoot, inputEl), 300);
    }

    /* =====================================================
       音声認識ロジック（完全修正版）
    ===================================================== */
    (function setupSpeechRecognition() {
      const micBtn = document.getElementById('custom-mic-btn');
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SR) {
        micBtn.disabled = true;
        micBtn.title = '音声入力非対応のブラウザです（Chrome推奨）';
        return;
      }

      const recognition = new SR();
      window._recognition = recognition;   // cancelVoice() からアクセスできるよう公開

      /* ─ 設定 ─ */
      recognition.lang            = 'ja-JP';
      recognition.continuous      = false;
      recognition.interimResults  = true;   // ★ モバイルでも途中結果を受け取る
      recognition.maxAlternatives = 1;

      let isRecording  = false;
      let finalText    = '';
      let interimText  = '';

      /* ─ ボタン押下 ─ */
      micBtn.addEventListener('click', () => {
        if (isRecording) {
          recognition.stop();
        } else {
          finalText   = '';
          interimText = '';
          try {
            recognition.start();
          } catch (e) {
            console.error('start error:', e);
            isRecording = false;
          }
        }
      });

      /* ─ 開始 ─ */
      recognition.onstart = () => {
        isRecording = true;
        micBtn.classList.add('recording');
        openVoiceOverlay();
      };

      /* ─ 途中結果 & 確定結果（★ 修正：interimResults 対応）─ */
      recognition.onresult = (event) => {
        interimText = '';
        finalText   = '';

        for (let i = 0; i < event.results.length; i++) {
          const result = event.results[i];
          if (result.isFinal) {
            finalText += result[0].transcript;
          } else {
            interimText += result[0].transcript;
          }
        }

        const displayText = finalText || interimText;

        // オーバーレイのテキストをリアルタイム更新
        voiceTextEl.textContent = displayText;
        voiceSendBtn.disabled   = !displayText.trim();

        if (finalText) {
          voiceStatusText.textContent = '認識完了 — 内容を確認して送信';
          voiceDot.style.display = 'none';
        }
      };

      /* ─ 終了 ─ */
      recognition.onend = () => {
        isRecording = false;
        micBtn.classList.remove('recording');

        const recognized = (finalText || interimText).trim();

        if (recognized) {
          // テキストが取れた → 自動送信（確認オーバーレイに0.6秒表示してから送信）
          voiceTextEl.textContent   = recognized;
          voiceSendBtn.disabled     = false;
          voiceStatusText.textContent = '✅ 送信します…';
          voiceDot.style.display    = 'none';
          setTimeout(() => {
            voiceOverlay.classList.remove('active');
            injectTextAndSend(recognized);
          }, 600);
        } else {
          // テキストが取れなかった → オーバーレイを閉じる
          voiceStatusText.textContent = '音声を検出できませんでした';
          voiceDot.style.display = 'none';
          setTimeout(() => voiceOverlay.classList.remove('active'), 1500);
        }
      };

      /* ─ エラー処理 ─ */
      recognition.onerror = (event) => {
        isRecording = false;
        micBtn.classList.remove('recording');
        voiceOverlay.classList.remove('active');

        const msgs = {
          'not-allowed'  : 'マイクの使用が許可されていません。\nブラウザのアドレスバー左のアイコンからマイクを許可してください。',
          'audio-capture': 'マイクが見つかりません。接続を確認してください。',
          'network'      : '音声認識にネットワーク接続が必要です。接続を確認してください。',
          'no-speech'    : null,
          'aborted'      : null,
        };
        const msg = msgs[event.error];
        if (msg) alert(msg);
        console.warn('[SpeechRecognition] error:', event.error);
      };
    })();

    /* =====================================================
       初期化
    ===================================================== */
    window.addEventListener("DOMContentLoaded", () => {
      const t = setInterval(() => {
        if (window.chatSdk) {
          chatSdk.registerContext(chatSdk.prebuilts.ces.createContext({
            deploymentName: DEPLOYMENT,
            tokenBroker: { enableTokenBroker: true },
            pdfPreview: { enablePdfPreview: true }
          }));
          clearInterval(t);
        }
      }, 300);

      window.addEventListener("click", (e) => {
        const path = e.composedPath();
        const a = path.find(el => el.tagName === "A");
        if (a && (a.href.includes(".pdf") || a.href.includes("storage.googleapis.com"))) {
          e.preventDefault();
          e.stopImmediatePropagation();
          openPdfInRightPanel(a.href);
        }
      }, true);
    });
  </script>
</body>
</html>
