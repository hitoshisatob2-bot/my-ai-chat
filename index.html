<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>kubota WSM AI - Mobile Fixed</title>

  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-default.css">
  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-layout.css">
  <script src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/chat-messenger.js"></script>

  <style>
    :root{
      --panel-width: min(46vw, 920px);
      --panel-min: 360px;
      --divider: rgba(0,0,0,.10);
      --header-h: 48px;
    }
    html, body { height: 100%; margin: 0; overflow: hidden; background: #fff; }
    .app { height: 100vh; width: 100vw; display: flex; align-items: stretch; }
    .chatArea { flex: 1; position: relative; }

    .pdfPanel {
      width: 0; flex: 0 0 auto; border-left: 1px solid var(--divider);
      background: #fff; overflow: hidden; transition: all 300ms ease;
    }
    body.pdf-open .pdfPanel { width: max(var(--panel-min), var(--panel-width)); }
    .pdfPanelInner { height: 100%; width: max(var(--panel-min), var(--panel-width)); display: flex; flex-direction: column; }
    .pdfHeader { height: var(--header-h); display: flex; align-items: center; padding: 0 10px; background: #fafafa; border-bottom: 1px solid var(--divider); }
    .pdfTitle { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pdfFrame { flex: 1; border: 0; }

    #custom-mic-btn {
      position: fixed; bottom: 15px; right: 65px; z-index: 2147483647;
      width: 44px; height: 44px; border: none; background: #f0f0f0;
      border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); touch-action: manipulation;
    }
    #custom-mic-btn.recording { background: #ff4b4b; color: white; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    @media (max-width: 900px) {
      .pdfPanel { position: fixed; right: 0; top: 0; height: 100vh; z-index: 99999; transform: translateX(100%); }
      body.pdf-open .pdfPanel { transform: translateX(0); width: 100vw; }
      .pdfPanelInner { width: 100vw; }
      #custom-mic-btn { bottom: 12px; right: 55px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="chatArea">
      <chat-messenger id="messenger" allow-citations="true" style="width:100%; height:100%;">
        <chat-messenger-container chat-title="kubota-wsm-ai">
           <chat-messenger-pdf-preview slot="side-panel"></chat-messenger-pdf-preview>
        </chat-messenger-container>
      </chat-messenger>
      <button id="custom-mic-btn" title="音声入力">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>
    <aside class="pdfPanel">
      <div class="pdfPanelInner">
        <div class="pdfHeader">
          <div id="pdfTitle" class="pdfTitle"></div>
          <button onclick="closePdfPanel()">閉じる</button>
        </div>
        <iframe id="pdfFrame" class="pdfFrame"></iframe>
      </div>
    </aside>
  </div>

  <script>
    const DEPLOYMENT = "projects/project-c482c56a-16d2-4b8c-b89/locations/us/apps/985287da-6040-4564-bc29-53ccd6a0b853/deployments/a5cff52b-8173-46dd-8057-7ce28af81a21";

    // ── PDFパネル操作 ──────────────────────────────────────────
    function openPdfInRightPanel(url) {
      document.getElementById("pdfTitle").textContent = "引用元PDF";
      document.getElementById("pdfFrame").src = url;
      document.body.classList.add("pdf-open");
    }
    function closePdfPanel() {
      document.body.classList.remove("pdf-open");
      document.getElementById("pdfFrame").src = "";
    }

    // ── ▼▼▼ 修正①: Shadow DOM を再帰的に検索するユーティリティ ▼▼▼ ──
    /**
     * 入れ子になった Shadow DOM も含めて selector に一致する最初の要素を返す
     * @param {ShadowRoot|Document|Element} root - 検索起点
     * @param {string} selector - CSSセレクター
     * @returns {Element|null}
     */
    function deepQuerySelector(root, selector) {
      if (!root) return null;

      // 現在の root 直下で検索
      const found = root.querySelector(selector);
      if (found) return found;

      // 子要素の shadowRoot を再帰的に検索
      const all = root.querySelectorAll('*');
      for (const el of all) {
        if (el.shadowRoot) {
          const result = deepQuerySelector(el.shadowRoot, selector);
          if (result) return result;
        }
      }
      return null;
    }

    // ── ▼▼▼ 修正②: フレームワーク対応の値セット関数 ▼▼▼ ──
    /**
     * React / LitElement 等のフレームワーク管理下の入力欄にも
     * 確実に値をセットするため、ネイティブの setter を使用する
     * @param {HTMLInputElement|HTMLTextAreaElement} input
     * @param {string} value
     */
    function setNativeValue(input, value) {
      const proto = input.tagName.toLowerCase() === 'textarea'
        ? HTMLTextAreaElement.prototype
        : HTMLInputElement.prototype;
      const setter = Object.getOwnPropertyDescriptor(proto, 'value')?.set;
      if (setter) {
        setter.call(input, value);
      } else {
        input.value = value;
      }
      // フレームワークの変更検知を発火
      input.dispatchEvent(new Event('input',  { bubbles: true, composed: true }));
      input.dispatchEvent(new Event('change', { bubbles: true, composed: true }));
    }

    // ── 音声認識セットアップ ──────────────────────────────────
    const micBtn = document.getElementById('custom-mic-btn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      // 非対応ブラウザではボタンを無効化
      micBtn.title = '音声入力非対応ブラウザです（Chrome/Edgeを使用してください）';
      micBtn.style.opacity = '0.4';
      micBtn.disabled = true;
    } else {
      const recognition = new SpeechRecognition();
      recognition.lang            = 'ja-JP';
      recognition.interimResults  = false;
      recognition.continuous      = false;
      recognition.maxAlternatives = 1;

      let isRecording = false;

      // ── マイクボタン押下 ──
      micBtn.addEventListener('click', () => {
        if (!isRecording) {
          try { recognition.start(); }
          catch (e) { console.warn('recognition.start() error:', e); }
        } else {
          recognition.stop();
        }
      });

      // ── 録音開始 ──
      recognition.onstart = () => {
        isRecording = true;
        micBtn.classList.add('recording');
        console.log('[STT] 録音開始');
      };

      // ── 録音終了（結果有無に関わらず） ──
      recognition.onend = () => {
        isRecording = false;
        micBtn.classList.remove('recording');
        console.log('[STT] 録音終了');
      };

      // ── ▼▼▼ 修正③: onresult — Shadow DOM 再帰検索 + native setter ▼▼▼ ──
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        console.log('[STT] 認識テキスト:', transcript);

        const messenger = document.getElementById('messenger');
        let input = null;

        // (A) messenger の shadowRoot から再帰検索
        if (messenger.shadowRoot) {
          input = deepQuerySelector(messenger.shadowRoot, 'textarea')
               || deepQuerySelector(messenger.shadowRoot, 'input[type="text"]')
               || deepQuerySelector(messenger.shadowRoot, 'input:not([type="hidden"]):not([type="checkbox"]):not([type="radio"])');
        }

        // (B) 見つかった場合: フレームワーク対応で値をセット
        if (input) {
          setNativeValue(input, transcript);
          input.focus();
          console.log('[STT] 入力欄へセット完了:', input.tagName);

        // (C) 見つからない場合: クリップボード経由のフォールバック
        } else {
          console.warn('[STT] 入力欄が見つかりませんでした。クリップボードにコピーします。');
          navigator.clipboard.writeText(transcript)
            .then(() => alert('音声認識結果:\n「' + transcript + '」\n\nクリップボードにコピーしました。\n入力欄に貼り付けてください（Ctrl+V / ⌘+V）。'))
            .catch(() => alert('音声認識結果:\n「' + transcript + '」\n\n手動で入力欄に入力してください。'));
        }
      };

      // ── ▼▼▼ 修正④: エラー種別を細分化して適切に対処 ▼▼▼ ──
      recognition.onerror = (event) => {
        isRecording = false;
        micBtn.classList.remove('recording');
        console.warn('[STT] エラー:', event.error, event.message);

        switch (event.error) {
          case 'no-speech':
            // 発話なしは通常エラーではないため alert 不要
            console.log('[STT] 発話が検出されませんでした（タイムアウト）');
            break;
          case 'not-allowed':
          case 'permission-denied':
            alert('マイクへのアクセスが拒否されています。\nブラウザのアドレスバー横のアイコンからマイクの許可を設定してください。');
            break;
          case 'network':
            alert('音声認識にはインターネット接続が必要です。\nネットワーク接続を確認してください。');
            break;
          case 'audio-capture':
            alert('マイクが見つかりません。\nデバイスにマイクが接続されているか確認してください。');
            break;
          case 'aborted':
            // 手動停止は無視
            break;
          default:
            alert('音声認識エラー: ' + event.error);
        }
      };
    }

    // ── 初期化 ──────────────────────────────────────────────
    window.addEventListener("DOMContentLoaded", () => {
      const t = setInterval(() => {
        if (window.chatSdk) {
          chatSdk.registerContext(chatSdk.prebuilts.ces.createContext({
            deploymentName: DEPLOYMENT,
            tokenBroker: { enableTokenBroker: true },
            pdfPreview: { enablePdfPreview: true }
          }));
          clearInterval(t);
        }
      }, 300);

      window.addEventListener("click", (e) => {
        const path = e.composedPath();
        const a = path.find(el => el.tagName === "A");
        if (a && (a.href.includes(".pdf") || a.href.includes("storage.googleapis.com"))) {
          e.preventDefault();
          e.stopImmediatePropagation();
          openPdfInRightPanel(a.href);
        }
      }, true);
    });
  </script>
</body>
</html>
