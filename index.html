<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>kubota WSM AI - PDF Page Fixed</title>

  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-default.css">
  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-layout.css">
  <script src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/chat-messenger.js"></script>

  <style>
    :root {
      --panel-width: min(46vw, 920px);
      --panel-min: 360px;
      --divider: rgba(0,0,0,.10);
      --header-h: 48px;
    }
    html, body { height: 100%; margin: 0; overflow: hidden; background: #fff; }
    .app { height: 100vh; width: 100vw; display: flex; align-items: stretch; }
    .chatArea { flex: 1; position: relative; }

    /* PDFパネル（スマホ対応） */
    .pdfPanel {
      width: 0; flex: 0 0 auto; border-left: 1px solid var(--divider);
      background: #fff; overflow: hidden; transition: all 300ms ease;
    }
    body.pdf-open .pdfPanel { width: max(var(--panel-min), var(--panel-width)); }
    .pdfPanelInner { height: 100%; width: max(var(--panel-min), var(--panel-width)); display: flex; flex-direction: column; }
    .pdfHeader { height: var(--header-h); display: flex; align-items: center; padding: 0 10px; background: #fafafa; border-bottom: 1px solid var(--divider); justify-content: space-between; }
    .pdfTitle { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; }
    .pdfFrame { flex: 1; border: 0; background: #525659; } /* 背景をPDFビュワー風に */

    .closeBtn {
      padding: 6px 12px; background: #eee; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 12px;
    }

    /* マイクボタン */
    #custom-mic-btn {
      position: fixed; bottom: 15px; right: 65px; z-index: 2147483647;
      width: 44px; height: 44px; border: none; background: #f0f0f0;
      border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); touch-action: manipulation;
    }
    #custom-mic-btn.recording { background: #ff4b4b; color: white; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,75,75,0.5); } 50% { box-shadow: 0 0 0 10px rgba(255,75,75,0); } }

    #stt-toast {
      position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,30,0.9); color: #fff; padding: 10px 18px;
      border-radius: 10px; font-size: 13px; z-index: 2147483647; opacity: 0; transition: opacity 0.2s;
    }
    #stt-toast.show { opacity: 1; }

    @media (max-width: 900px) {
      .pdfPanel { position: fixed; right: 0; top: 0; height: 100vh; z-index: 99999; transform: translateX(100%); }
      body.pdf-open .pdfPanel { transform: translateX(0); width: 100vw; }
      .pdfPanelInner { width: 100vw; }
      #custom-mic-btn { bottom: 12px; right: 55px; }
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="chatArea">
      <chat-messenger id="messenger" allow-citations="true" style="width:100%; height:100%;">
        <chat-messenger-container chat-title="kubota-wsm-ai">
          <chat-messenger-pdf-preview slot="side-panel"></chat-messenger-pdf-preview>
        </chat-messenger-container>
      </chat-messenger>

      <button id="custom-mic-btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>

    <aside class="pdfPanel">
      <div class="pdfPanelInner">
        <div class="pdfHeader">
          <div id="pdfTitle" class="pdfTitle">引用プレビュー</div>
          <button class="closeBtn" onclick="closePdfPanel()">閉じる</button>
        </div>
        <iframe id="pdfFrame" class="pdfFrame"></iframe>
      </div>
    </aside>
  </div>

  <div id="stt-toast"></div>

  <script>
    const DEPLOYMENT = "projects/project-c482c56a-16d2-4b8c-b89/locations/us/apps/985287da-6040-4564-bc29-53ccd6a0b853/deployments/a5cff52b-8173-46dd-8057-7ce28af81a21";

    /* =====================================================
       核心修正：PDFの特定のページを開くロジック
    ===================================================== */
    function openPdfInRightPanel(url) {
      // URLからファイル名部分を抽出してタイトルに表示
      const fileName = url.split('/').pop().split('#')[0];
      document.getElementById("pdfTitle").textContent = "引用元: " + decodeURIComponent(fileName);
      
      const frame = document.getElementById("pdfFrame");
      
      // 既存の iframe を一度空にして、確実に再ロードさせる（同じPDFの別ページ対策）
      frame.src = "about:blank";
      
      setTimeout(() => {
        // PDFの表示位置を調整するためのパラメータを付与
        // すでに #page= がある場合はそのまま、ない場合はURLをセット
        // ズーム設定 (#view=FitH) を加えるとより根拠が見やすくなります
        let finalUrl = url;
        if (!finalUrl.includes('#view=')) {
          finalUrl += (finalUrl.includes('#') ? '&' : '#') + 'view=FitH';
        }
        
        frame.src = finalUrl;
        document.body.classList.add("pdf-open");
      }, 50);
    }

    function closePdfPanel() {
      document.body.classList.remove("pdf-open");
      document.getElementById("pdfFrame").src = "";
    }

    /* =====================================================
       音声認識 & Shadow DOM 入力ロジック (維持)
    ===================================================== */
    let targetInput = null;
    function showToast(msg) {
      const t = document.getElementById('stt-toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    const micBtn = document.getElementById('custom-mic-btn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      
      micBtn.addEventListener('click', () => {
        try { recognition.start(); } catch(e) { recognition.stop(); }
      });

      recognition.onstart = () => { micBtn.classList.add('recording'); showToast("話してください..."); };
      recognition.onend = () => { micBtn.classList.remove('recording'); };
      
      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        const messenger = document.getElementById("messenger");
        
        // Shadow DOM 内部を探索して入力
        const findAndFill = (root) => {
          const input = root.querySelector('textarea, input:not([type="hidden"])');
          if (input) {
            input.value = text;
            input.dispatchEvent(new Event('input', { bubbles: true, composed: true }));
            input.focus();
            return true;
          }
          const children = Array.from(root.querySelectorAll('*')).filter(n => n.shadowRoot);
          for (let child of children) { if (findAndFill(child.shadowRoot)) return true; }
          return false;
        };
        findAndFill(messenger.shadowRoot);
      };
    }

    /* =====================================================
       リンククリックのイベントリスナー (重要)
    ===================================================== */
    window.addEventListener("DOMContentLoaded", () => {
      // SDK初期化
      const t = setInterval(() => {
        if (window.chatSdk) {
          chatSdk.registerContext(chatSdk.prebuilts.ces.createContext({
            deploymentName: DEPLOYMENT,
            tokenBroker: { enableTokenBroker: true },
            pdfPreview: { enablePdfPreview: true }
          }));
          clearInterval(t);
        }
      }, 300);

      // クリックイベントの横取り（PDFページ情報を維持して渡す）
      window.addEventListener("click", (e) => {
        const path = e.composedPath();
        const a = path.find(el => el.tagName === "A");
        
        if (a && (a.href.includes(".pdf") || a.href.includes("storage.googleapis.com"))) {
          // 重要：a.href には #page=5 などの情報が含まれています
          e.preventDefault();
          e.stopImmediatePropagation();
          openPdfInRightPanel(a.href);
        }
      }, true);
    });
  </script>
</body>
</html>
