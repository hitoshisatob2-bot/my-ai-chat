<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>kubota WSM AI - Final Voice</title>
  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-default.css">
  <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/themes/chat-messenger-layout.css">
  <script src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.12/chat-messenger.js"></script>
  <style>
    :root { --panel-width: min(46vw, 920px); --panel-min: 360px; --divider: rgba(0,0,0,.10); }
    html, body { height: 100%; margin: 0; overflow: hidden; background: #fff; font-family: sans-serif; }
    .app { height: 100vh; width: 100vw; display: flex; align-items: stretch; }
    .chatArea { flex: 1; position: relative; }
    #init-voice-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 999999; display: flex; align-items: center; justify-content: center; }
    .start-btn { padding: 30px 60px; font-size: 24px; font-weight: bold; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 15px; }
    #custom-mic-btn { position: fixed; bottom: 15px; right: 65px; z-index: 2147483647; width: 44px; height: 44px; border: none; background: #f0f0f0; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #speech-control { position: fixed; bottom: 70px; right: 15px; z-index: 2147483647; display: none; }
    .voice-btn { padding: 8px 16px; background: rgba(0,0,0,0.8); color: white; border-radius: 20px; border: none; font-size: 12px; }
    .pdfPanel { width: 0; flex: 0 0 auto; border-left: 1px solid var(--divider); background: #fff; overflow: hidden; transition: all 300ms ease; }
    body.pdf-open .pdfPanel { width: max(var(--panel-min), var(--panel-width)); }
  </style>
</head>
<body>

  <div id="init-voice-overlay">
    <button class="start-btn" onclick="activateAndStart()">音声を有効にして開始</button>
  </div>

  <div class="app">
    <div class="chatArea">
      <chat-messenger id="messenger" allow-citations="true" style="width:100%; height:100%;">
        <chat-messenger-container chat-title="kubota-wsm-ai">
          <chat-messenger-pdf-preview slot="side-panel"></chat-messenger-pdf-preview>
        </chat-messenger-container>
      </chat-messenger>
      <button id="custom-mic-btn"><svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
      <div id="speech-control"><button onclick="window.speechSynthesis.cancel()" class="voice-btn">停止 ■</button></div>
    </div>
    <aside class="pdfPanel"><div style="height:100%; display:flex; flex-direction:column;"><div style="height:48px; display:flex; align-items:center; padding:0 10px; border-bottom:1px solid #ddd; justify-content:space-between;"><span style="font-size:12px;">引用元</span><button onclick="document.body.classList.remove('pdf-open')">閉じる</button></div><iframe id="pdfFrame" style="flex:1; border:0;"></iframe></div></aside>
  </div>

  <script>
    const DEPLOYMENT = "projects/project-c482c56a-16d2-4b8c-b89/locations/us/apps/985287da-6040-4564-bc29-53ccd6a0b853/deployments/a5cff52b-8173-46dd-8057-7ce28af81a21";
    let voiceEnabled = false;
    let lastSpokenText = "";

    function activateAndStart() {
      document.getElementById('init-voice-overlay').style.display = 'none';
      voiceEnabled = true;
      const uttr = new SpeechSynthesisUtterance("準備完了。回答を自動で読み上げます。");
      uttr.lang = 'ja-JP';
      window.speechSynthesis.speak(uttr);
      startMonitoring();
    }

    // 読み上げ本体
    function speak(text) {
      if (!voiceEnabled || !text || text === lastSpokenText) return;
      lastSpokenText = text;
      
      window.speechSynthesis.cancel();
      const cleanText = text.replace(/\[\d+\]/g, '').replace(/[*#]/g, '').trim();
      const uttr = new SpeechSynthesisUtterance(cleanText);
      uttr.lang = 'ja-JP';
      uttr.rate = 1.1;
      uttr.onstart = () => document.getElementById('speech-control').style.display = 'block';
      uttr.onend = () => document.getElementById('speech-control').style.display = 'none';
      window.speechSynthesis.speak(uttr);
    }

    // Shadow DOMの奥深くからテキストを抽出する再帰関数
    function getDeepinnerText(root) {
      if (!root) return "";
      let text = root.innerText || "";
      const shadows = Array.from(root.querySelectorAll('*')).filter(el => el.shadowRoot);
      for (let s of shadows) {
        text += " " + getDeepinnerText(s.shadowRoot);
      }
      return text;
    }

    function startMonitoring() {
      const messenger = document.getElementById('messenger');
      let stableText = "";
      let timer = null;

      setInterval(() => {
        // 1. Messenger全体のShadow DOMからテキストをひっかき出す
        const currentText = getDeepinnerText(messenger.shadowRoot).trim();
        
        // 2. テキストが変化中（AIが回答中）かチェック
        if (currentText !== stableText) {
          stableText = currentText;
          
          // 3. 変化が止まってから1.5秒待つ（回答終了の判定）
          clearTimeout(timer);
          timer = setTimeout(() => {
            // 4. 最新の「回答部分」だけを切り出す（一番最後のブロック）
            const parts = currentText.split(/\n\n|ユーザー:/);
            const latestResponse = parts[parts.length - 1].trim();
            
            if (latestResponse.length > 5 && !latestResponse.includes('...')) {
              speak(latestResponse);
            }
          }, 1500); 
        }
      }, 1000);
    }

    /* SDK初期化・PDF・マイクは既存のまま */
    window.addEventListener("DOMContentLoaded", () => {
      setInterval(() => {
        if (window.chatSdk && document.getElementById('messenger').shadowRoot) {
          if (!window.sdkInitialized) {
            chatSdk.registerContext(chatSdk.prebuilts.ces.createContext({
              deploymentName: DEPLOYMENT, tokenBroker: { enableTokenBroker: true }, pdfPreview: { enablePdfPreview: true }
            }));
            window.sdkInitialized = true;
          }
        }
      }, 1000);

      window.addEventListener("click", (e) => {
        const path = e.composedPath();
        const a = path.find(el => el.tagName === "A");
        if (a && a.href.includes("storage.googleapis.com")) {
          e.preventDefault();
          document.getElementById('pdfFrame').src = a.href;
          document.body.classList.add('pdf-open');
        }
      }, true);
    });

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      document.getElementById('custom-mic-btn').onclick = () => { try { recognition.start(); } catch(e) { recognition.stop(); } };
      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        const input = messenger.shadowRoot.querySelector('textarea, input');
        if (input) { input.value = text; input.dispatchEvent(new Event('input', { bubbles: true })); }
      };
    }
  </script>
